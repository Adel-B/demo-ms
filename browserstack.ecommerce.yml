projectName: Cross-Browser Ecommerce Demo
buildName: Ecommerce Cross-Browser Suite
buildIdentifier: '#${BUILD_NUMBER}'
platforms:
  - os: Windows
    osVersion: 11
    browserName: chrome
    browserVersion: latest
    playwrightConfigOptions:
      name: windows-chrome
  - os: OS X
    osVersion: Ventura
    browserName: chrome
    browserVersion: latest
    playwrightConfigOptions:
      name: osx-chrome
  - deviceName: Samsung Galaxy S23 Ultra
    browserName: chrome
    osVersion: 13.0
    playwrightConfigOptions:
      name: samsung-mobile
parallelsPerPlatform: 1
debug: true
networkLogs: true
consoleLogs: errors
accessibility: true
percy: true
percyCaptureMode: testcase
framework: playwright