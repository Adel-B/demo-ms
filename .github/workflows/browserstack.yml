name: BrowserStack Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ecommerce-tests:
    name: Ecommerce Cross-Browser Suite
    runs-on: ubuntu-latest
    env:
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ecommerce tests on BrowserStack
        run: npm run test:ecommerce

  ms-flowers-tests:
    name: M&S Flowers QA Suite
    runs-on: ubuntu-latest
    env:
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run M&S Flowers tests on BrowserStack
        run: npm run test:ms-flowers

  percy-visual-tests:
    name: Percy Visual Regression
    runs-on: ubuntu-latest
    needs: [ecommerce-tests, ms-flowers-tests]
    env:
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
      PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Percy visual tests — Ecommerce
        run: npm run test:percy:ecommerce

      - name: Run Percy visual tests — M&S Flowers
        run: npm run test:percy:ms-flowers